services:
  swapbot:
    build: .
    container_name: swapbot
    ports:
      - "0.0.0.0:2889:2889"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2889/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
